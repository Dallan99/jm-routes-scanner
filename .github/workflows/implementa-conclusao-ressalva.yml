    const { supabaseAdmin } = await import("@/integrations/supabase/client.server");
    const { data: conclusoes } = await supabaseAdmin
      .from("audit_logs")
      .select("user_id, created_at, detalhes")
      .eq("acao", "triagem.rota_concluida_ressalva")
      .eq("entidade", "importacao_escala")
      .eq("entidade_id", impAtiva.id)
      .order("created_at", { ascending: false });

    const porRota = new Map<
      string,
      { motivo: string; concluidaEm: string; concluidaPor: string; faltantes: number }
    >();
    for (const registro of conclusoes ?? []) {
      const detalhes = (registro.detalhes ?? {}) as Record<string, unknown>;
      const rota = typeof detalhes.rota === "string" ? detalhes.rota : null;
      if (!rota || porRota.has(rota)) continue;
      porRota.set(rota, {
        motivo: String(detalhes.motivo ?? "Motivo não informado"),
        concluidaEm: registro.created_at,
        concluidaPor: registro.user_id,
        faltantes: Number(detalhes.faltantes ?? 0),
      });
