name: Implementa conclusão de rota com ressalva

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/implementa-conclusao-ressalva.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Aplicar alterações
        shell: python
        run: |
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f"Trecho não encontrado: {label}")
              return text.replace(old, new, 1)

          # BACKEND
          path = Path("src/lib/triagem.functions.ts")
          text = path.read_text(encoding="utf-8")

          marker = '''export type LocalizacaoShipmentTriagem =
  | {
      encontrado: true;
      shipment: string;
      rota: string;
      planejada: string | null;
      otimizada: string | null;
      cidade: string | null;
      triado: boolean;
    }
  | { encontrado: false; shipment: string; mensagem: string };
'''
          addition = marker + '''
const concluirRotaRessalvaSchema = z.object({
  baseId: z.string().uuid(),
  dataOperacional: z.string().regex(/^\\d{4}-\\d{2}-\\d{2}$/),
  rota: z.string().trim().min(1).max(120),
  motivo: z.string().trim().min(5, "Informe um motivo com pelo menos 5 caracteres.").max(1000),
});

export type ConclusaoRotaRessalva = {
  rota: string;
  motivo: string;
  previstos: number;
  triados: number;
  faltantes: number;
  concluidaEm: string;
  concluidaPor: string;
};

export const concluirRotaComRessalva = createServerFn({ method: "POST" })
  .middleware([requireSupabaseAuth])
  .inputValidator((d: unknown) => concluirRotaRessalvaSchema.parse(d))
  .handler(async ({ data, context }): Promise<ConclusaoRotaRessalva> => {
    const { supabase, userId } = context;
    const { supabaseAdmin } = await import("@/integrations/supabase/client.server");
    const { auditRequestMeta } = await import("./audit.server");

    const { data: impAtiva, error: impErro } = await supabase
      .from("importacoes_escala")
      .select("id")
      .eq("base_id", data.baseId)
      .eq("data_operacional", data.dataOperacional)
      .eq("ativa", true)
      .maybeSingle();
    if (impErro) throw new Error(impErro.message);
    if (!impAtiva) throw new Error("Não existe importação ativa para esta base e dia operacional.");

    const PAGE = 1000;
    const linhas: Array<{
      shipment: string | null;
      planejada: string | null;
      otimizada: string | null;
      triado: boolean | null;
    }> = [];
    for (let from = 0; ; from += PAGE) {
      const { data: page, error } = await supabase
        .from("escalas")
        .select("shipment, planejada, otimizada, triado")
        .eq("importacao_id", impAtiva.id)
        .order("id", { ascending: true })
        .range(from, from + PAGE - 1);
      if (error) throw new Error(error.message);
      if (!page?.length) break;
      linhas.push(...page);
      if (page.length < PAGE) break;
    }

    const linhasRota = linhas.filter(
      (linha) => linha.shipment?.trim() && rotaEfetivaTriagem(linha) === data.rota,
    );
    const previstos = linhasRota.length;
    const triados = linhasRota.filter((linha) => !!linha.triado).length;
    const faltantes = Math.max(previstos - triados, 0);

    if (previstos === 0) throw new Error("Rota não encontrada na importação ativa.");
    if (faltantes === 0) {
      throw new Error("A rota já está 100% concluída e não precisa de ressalva.");
    }

    const { data: existente } = await supabaseAdmin
      .from("audit_logs")
      .select("user_id, created_at, detalhes")
      .eq("acao", "triagem.rota_concluida_ressalva")
      .eq("entidade", "importacao_escala")
      .eq("entidade_id", impAtiva.id)
      .contains("detalhes", { rota: data.rota } as never)
      .order("created_at", { ascending: false })
      .limit(1)
      .maybeSingle();

    if (existente) {
      const detalhes = (existente.detalhes ?? {}) as Record<string, unknown>;
      return {
        rota: data.rota,
        motivo: String(detalhes.motivo ?? data.motivo),
        previstos: Number(detalhes.previstos ?? previstos),
        triados: Number(detalhes.triados ?? triados),
        faltantes: Number(detalhes.faltantes ?? faltantes),
        concluidaEm: existente.created_at,
        concluidaPor: existente.user_id,
      };
    }

    const concluidaEm = new Date().toISOString();
    const { ip, user_agent } = auditRequestMeta();
    const { error: auditErro } = await supabaseAdmin.from("audit_logs").insert({
      user_id: userId,
      acao: "triagem.rota_concluida_ressalva",
      entidade: "importacao_escala",
      entidade_id: impAtiva.id,
      detalhes: {
        rota: data.rota,
        motivo: data.motivo,
        previstos,
        triados,
        faltantes,
        base_id: data.baseId,
        data_operacional: data.dataOperacional,
        status: "concluida_ressalva",
      } as never,
      ip,
      user_agent,
      created_at: concluidaEm,
    });
    if (auditErro) throw new Error(`Não foi possível registrar a conclusão: ${auditErro.message}`);

    return {
      rota: data.rota,
      motivo: data.motivo,
      previstos,
      triados,
      faltantes,
      concluidaEm,
      concluidaPor: userId,
    };
  });
'''
